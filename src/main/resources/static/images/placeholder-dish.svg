<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9f3"/>
      <stop offset="100%" stop-color="#fff0eb"/>
    </linearGradient>
    <linearGradient id="food" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#e85d3a"/>
    </linearGradient>
    <radialGradient id="plateShine" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f5f5f5" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>
  <!-- plate shadow -->
  <ellipse cx="400" cy="310" rx="200" ry="28" fill="#000" opacity="0.06"/>
