  <ellipse cx="400" cy="268" rx="145" ry="52" fill="url(#food)"/>
  <!-- steam -->
  <path d="M360 180 Q350 150 365 130 Q380 150 370 180" fill="none" stroke="#ccc" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M400 170 Q390 135 405 110 Q420 135 410 170" fill="none" stroke="#ccc" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M440 180 Q430 150 445 130 Q460 150 450 180" fill="none" stroke="#ccc" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- garnish dots -->
